<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" width="160" height="32">
  <defs>
    <!-- Gradient cho chữ AI và các chi tiết công nghệ -->
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="50%" stop-color="#00A3FF" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>
    
    <!-- Gradient cho chữ Screen Recorder -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#F3F4F6" />
      <stop offset="100%" stop-color="#9CA3AF" />
    </linearGradient>
    
    <!-- Gradient cho Icon ghi âm công nghệ -->
    <linearGradient id="iconRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>
    
    <linearGradient id="iconCenterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#9CA3AF" />
    </linearGradient>

    <!-- Hiệu ứng bóng đổ nhẹ cho chữ -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00A3FF" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g transform="translate(2, 2)">
    <!-- 1. Icon Camera/Record công nghệ sang trọng thay thế nút tròn xám -->
    <g transform="translate(0, 4)">
      <!-- Vòng tròn ngoài phát sáng nhẹ -->
      <circle cx="16" cy="16" r="14" fill="none" stroke="url(#iconRingGrad)" stroke-width="2.5" opacity="0.9" />
      <!-- Vòng tròn chấm ghi âm ở giữa giống len camera và nút record -->
      <circle cx="16" cy="16" r="7" fill="url(#aiGrad)" filter="url(#glow)" />
      <!-- Điểm bóng sáng trên nút record -->
      <circle cx="14" cy="14" r="2" fill="#FFFFFF" opacity="0.8" />
    </g>

    <!-- 2. Phần chữ "AI" (Futuristic Bold) -->
    <text x="40" y="27" 
          font-family="system-ui, -apple-system, 'Outfit', 'Inter', sans-serif" 
          font-weight="900" 
          font-size="23" 
          fill="url(#aiGrad)" 
          letter-spacing="0.5"
          filter="url(#glow)">AI</text>

    <!-- 3. Phần chữ "Screen Recorder" (Sleek Modern) -->
    <text x="70" y="21" 
          font-family="system-ui, -apple-system, 'Inter', sans-serif" 
          font-weight="800" 
          font-size="12.5" 
          fill="url(#textGrad)" 
          letter-spacing="0.2">SCREEN</text>
          
    <text x="70" y="32" 
          font-family="system-ui, -apple-system, 'Inter', sans-serif" 
          font-weight="600" 
          font-size="9.5" 
          fill="#9CA3AF" 
          letter-spacing="1">RECORDER</text>
  </g>
</svg>
